<!DOCTYPE html>
<html>
<head>
    <title>Hello Kitty Login</title>
</head>
<body style="background-color:#ffd6e7; font-family:Arial; text-align:center; padding-top:50px;">

    <div style="background:white; width:400px; margin:auto; padding:30px; border-radius:20px;">
        <h1>Login</h1>

        <form method="post" action="/login">
            <input type="text" name="username" placeholder="Benutzername" style="width:80%; padding:10px; margin:10px;">
            <br>
            <input type="password" name="password" placeholder="Passwort" style="width:80%; padding:10px; margin:10px;">
            <br>
            <button type="submit" style="background:hotpink; color:white; padding:10px 30px; border:none; border-radius:10px;">
                Einloggen
            </button>
        </form>
    </div>

</body>
</html>
